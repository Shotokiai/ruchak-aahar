<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Culinary Hearth</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1A1A1A;display:flex;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
    #root{width:100%;max-width:390px;min-height:100vh;background:#F5EFE0;overflow-x:hidden;position:relative;}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#E0D8CC;outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;box-shadow:0 2px 8px rgba(123,37,37,.4);}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;border:none;}
    ::-webkit-scrollbar{width:0;}
    .fade-in{animation:fadeIn .3s ease;}
    .slide-up{animation:slideUp .35s cubic-bezier(.4,0,.2,1);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    .tap:active{transform:scale(.96);transition:transform .1s;}
    .vote-skip:active{transform:scale(.88) rotate(-5deg);transition:transform .15s;}
    .vote-love:active{transform:scale(.88);transition:transform .15s;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

const C={bg:'#F5EFE0',primary:'#7B2525',dark:'#1A1A1A',card:'#FFFFFF',text:'#1A1A1A',muted:'#9A8E82',green:'#4CAF50',border:'#E8DDD0',light:'#F0E8DC'};

const DISHES=[
  {id:1,name:"Dal Makhani",img:"https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=500&q=80",protein:32,carbs:18,fiber:6,cal:280,desc:'"Yeh sirf dal nahi, emotional support system hai foodie logon ka"',by:"Omkar",votes:3,
   ingredients:["1 cup whole black lentils (urad dal)","¼ cup red kidney beans","2 tbsp butter","1 cup tomato puree","1 tsp cumin seeds","2 tsp garam masala","½ cup heavy cream","Salt to taste"],
   steps:["Soak lentils and beans overnight","Pressure cook for 6-8 whistles until soft","Heat butter, add cumin seeds and tomato puree","Cook till oil separates, then add cream","Combine with lentils and simmer 25 mins","Garnish with cream and serve hot"]},
  {id:2,name:"Roasted Salmon & Spring Greens",img:"https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500&q=80",protein:15,carbs:38,fiber:9,cal:320,desc:'"A light, fresh meal for a busy Tuesday. Quick 20-min prep."',by:"Sush",votes:3,confirmed:true,
   ingredients:["2 salmon fillets (200g each)","1 bunch asparagus","2 cups baby spinach","1 lemon, sliced","3 tbsp olive oil","2 garlic cloves, minced","Salt and black pepper"],
   steps:["Preheat oven to 200°C","Season salmon with salt, pepper, garlic and lemon","Roast salmon and asparagus for 15-18 minutes","Sauté spinach briefly with olive oil","Plate everything together with lemon wedge"]},
  {id:3,name:"Butter Chicken",img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=500&q=80",protein:28,carbs:22,fiber:4,cal:340,desc:'"The OG comfort food. Basically a warm hug in curry form."',by:"Rutuja",votes:2,
   ingredients:["500g chicken breast","200ml cream","2 cups tomato puree","3 tbsp butter","2 tsp garam masala","1 tbsp ginger-garlic paste","1 tsp red chilli powder"],
   steps:["Marinate chicken in yogurt and spices 1 hour","Grill or pan-fry until lightly charred","Make sauce: butter + onions + tomato + spices","Add cream and simmer 15 mins","Add chicken and cook 10 more mins","Serve with rice or naan"]},
  {id:4,name:"Paneer Tikka",img:"https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=500&q=80",protein:24,carbs:14,fiber:3,cal:260,desc:'"Vegetarians deserve drama too — and this delivers every time"',by:"Omkar",votes:1,
   ingredients:["400g paneer, cubed","1 cup thick yogurt","2 tbsp tikka masala","1 capsicum, chunked","1 red onion","Chaat masala","Lemon juice"],
   steps:["Marinate paneer + veggies in yogurt + spices 2 hrs","Thread onto skewers alternating pieces","Grill on high heat 10-12 mins, turning once","Dust with chaat masala and lemon","Serve with mint chutney"]},
  {id:5,name:"Chicken Biryani",img:"https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&q=80",protein:35,carbs:52,fiber:5,cal:480,desc:'"Sunday ki feeling, any day of the week. No further questions."',by:"Sush",votes:3,
   ingredients:["500g chicken","2 cups basmati rice","Whole spices (bay leaf, cardamom, cloves)","Saffron in warm milk","1 cup fried onions","Mint leaves","3 tbsp ghee"],
   steps:["Marinate chicken in spiced yogurt 3 hours","Par-cook rice with whole spices to 70%","Layer rice and chicken in heavy pot","Add saffron milk, fried onions and mint","Dum cook on low heat 25-30 mins","Rest 10 mins before serving with raita"]}
];

const MEMBERS=[
  {id:1,name:"Sush",role:"admin",initials:"SU",eating:true,color:"#D4956A"},
  {id:2,name:"Omkar",initials:"OM",eating:true,color:"#6A9FD4"},
  {id:3,name:"Rutuja",initials:"RU",eating:false,color:"#9A6AD4"},
];

const PLAN=[
  {day:"Mon",date:7,dish:DISHES[1]},{day:"Tue",date:8,dish:DISHES[0]},
  {day:"Wed",date:9,dish:DISHES[4]},{day:"Thu",date:10,dish:DISHES[2]},
  {day:"Fri",date:11,dish:DISHES[3]},{day:"Sat",date:12,dish:null},{day:"Sun",date:13,dish:null}
];

// ── BOTTOM NAV ────────────────────────────────────────────────────
const BottomNav=({active,go})=>{
  const tabs=[
    {id:'hearth',label:'Hearth',icon:<HouseIcon active={active==='hearth'}/>},
    {id:'import',label:'Import',icon:<ImportIcon active={active==='import'}/>},
    {id:'match',label:'Match',icon:<MatchIcon active={active==='match'}/>},
    {id:'planner',label:'Planner',icon:<PlanIcon active={active==='planner'}/>},
  ];
  return(
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,background:'white',borderTop:`1px solid ${C.border}`,padding:'10px 8px 22px',display:'flex',justifyContent:'space-around',zIndex:100,boxShadow:'0 -4px 20px rgba(0,0,0,.06)'}}>
      {tabs.map(t=>(
        <div key={t.id} className="tap" onClick={()=>go(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',minWidth:60}}>
          <div style={{width:46,height:46,borderRadius:'50%',background:active===t.id?C.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}>
            {t.icon}
          </div>
          <span style={{fontSize:11,color:active===t.id?C.primary:C.muted,fontWeight:active===t.id?600:400,transition:'color .2s'}}>{t.label}</span>
        </div>
      ))}
    </div>
  );
};
const HouseIcon=({active})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9Z" stroke={active?'white':C.muted} strokeWidth="2" fill={active?'white':'none'}/></svg>;
const ImportIcon=({active})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 3V15M12 15L8 11M12 15L16 11M3 17V20C3 20.55 3.45 21 4 21H20C20.55 21 21 20.55 21 20V17" stroke={active?'white':C.muted} strokeWidth="2" strokeLinecap="round"/></svg>;
const MatchIcon=({active})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 3 15 3 8.5C3 6 5 4 7.5 4C9.24 4 10.91 4.96 12 6.5C13.09 4.96 14.76 4 16.5 4C19 4 21 6 21 8.5C21 15 12 21 12 21Z" stroke={active?'white':C.muted} strokeWidth="2" fill={active?'white':'none'}/></svg>;
const PlanIcon=({active})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke={active?'white':C.muted} strokeWidth="2"/><path d="M16 2V6M8 2V6M3 10H21" stroke={active?'white':C.muted} strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="15" r="1.5" fill={active?'white':C.muted}/><circle cx="12" cy="15" r="1.5" fill={active?'white':C.muted}/><circle cx="16" cy="15" r="1.5" fill={active?'white':C.muted}/></svg>;

// ── WELCOME SCREEN ─────────────────────────────────────────────────
const WelcomeScreen=({go})=>{
  const[slide,setSlide]=useState(0);
  const slides=[
    {img:"https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&q=80",title:"No more dinner debates",desc:'Turn "What\'s for dinner?" into a celebration. We handle the consensus so you can focus on the cooking.'},
    {img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=500&q=80",title:"AI-powered recipe extraction",desc:"Transform food reels and blogs into clean, structured cooking steps instantly."},
    {img:"https://images.unsplash.com/photo-1547592180-85f173990554?w=500&q=80",title:"Family-wide voting",desc:"Give everyone a seat at the table. Cast votes on the weekly menu and find meals everyone loves."}
  ];
  useEffect(()=>{const t=setInterval(()=>setSlide(s=>(s+1)%3),3800);return()=>clearInterval(t);},[]);
  const s=slides[slide];
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100vh',padding:'52px 24px 40px',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:32}}>
        <div style={{width:38,height:38,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:18,color:'white'}}>🍽</span>
        </div>
        <span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:17,color:C.primary}}>The Culinary Hearth</span>
      </div>
      <div style={{borderRadius:28,overflow:'hidden',height:268,marginBottom:28,position:'relative',boxShadow:'0 12px 32px rgba(0,0,0,.14)'}}>
        <img src={s.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover',transition:'opacity .5s'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.2))'}}/>
      </div>
      <div style={{flex:1,minHeight:100}}>
        <h1 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,color:C.text,marginBottom:10,lineHeight:1.25}}>{s.title}</h1>
        <p style={{color:C.muted,fontSize:14.5,lineHeight:1.65}}>{s.desc}</p>
      </div>
      <div style={{display:'flex',gap:7,justifyContent:'center',margin:'20px 0 24px'}}>
        {[0,1,2].map(i=><div key={i} onClick={()=>setSlide(i)} style={{height:6,borderRadius:3,background:i===slide?C.primary:'#D8CFBF',width:i===slide?28:8,transition:'all .3s',cursor:'pointer'}}/>)}
      </div>
      <button className="tap" onClick={()=>go('onboarding1')} style={{width:'100%',padding:'15px',borderRadius:50,border:'2px solid #1A1A1A',background:'white',display:'flex',alignItems:'center',justifyContent:'center',gap:12,fontSize:15,fontWeight:600,cursor:'pointer',marginBottom:14,fontFamily:'DM Sans'}}>
        <GoogleG/> Sign in with Google
      </button>
      <p style={{textAlign:'center',color:C.muted,fontSize:13.5}}>Already have a hearth? <span onClick={()=>go('hearth')} style={{color:C.primary,fontWeight:600,cursor:'pointer'}}>Log in</span></p>
    </div>
  );
};

const GoogleG=()=><svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>;

// ── ONBOARDING STEP 1 ───────────────────────────────────────────────
const Onboarding1=({go})=>{
  const[age,setAge]=useState(28);
  const[wt,setWt]=useState(165);
  const[ht,setHt]=useState(71);
  const[unit,setUnit]=useState('inch');
  const fmtHt=in_=>unit==='inch'?`${Math.floor(in_/12)}'${in_%12}"`:`${Math.round(in_*2.54)} cm`;
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('welcome')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:15}}>✕</div>
        <div>
          <div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div>
          <div style={{fontSize:12,color:C.muted}}>Step 1 of 2</div>
        </div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:32}}>
        <div style={{height:'100%',width:'50%',background:C.primary,borderRadius:2}}/>
      </div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:27,fontWeight:700,marginBottom:28,lineHeight:1.3}}>Let's get to know <span style={{color:C.primary}}>the chef.</span></h1>
      <SliderCard label="What is your age?" val={age} set={setAge} min={13} max={100} lo="13" hi="100"/>
      <SliderCard label="What is your body weight?" val={`${wt}`} rawVal={wt} set={setWt} min={80} max={350} lo="80 lbs" hi="350 lbs" suffix=" lbs"/>
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>What is your height?</div>
            <div style={{display:'flex',gap:4}}>
              {['inch','cm'].map(u=><span key={u} onClick={()=>setUnit(u)} style={{padding:'3px 12px',borderRadius:20,fontSize:12,background:unit===u?C.dark:'#F0E8DC',color:unit===u?'white':C.muted,cursor:'pointer',fontWeight:500,transition:'all .2s'}}>{u}</span>)}
            </div>
          </div>
          <span style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:C.primary}}>{fmtHt(ht)}</span>
        </div>
        <input type="range" min={48} max={96} value={ht} onChange={e=>setHt(+e.target.value)}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}><span>4'0"</span><span>8'0"</span></div>
      </div>
      <button className="tap" onClick={()=>go('onboarding2')} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:C.primary,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:12,fontFamily:'DM Sans'}}>
        Continue to Preferences →
      </button>
    </div>
  );
};
const SliderCard=({label,val,rawVal,set,min,max,lo,hi,suffix=''})=>(
  <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:500,maxWidth:'60%'}}>{label}</div>
      <span style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:C.primary}}>{val}{suffix}</span>
    </div>
    <input type="range" min={min} max={max} value={rawVal||val} onChange={e=>set(+e.target.value)}/>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}><span>{lo}</span><span>{hi}</span></div>
  </div>
);

// ── ONBOARDING STEP 2 ───────────────────────────────────────────────
const Onboarding2=({go})=>{
  const[sel,setSel]=useState('nonveg');
  const opts=[
    {id:'veg',emoji:'🥗',label:'Veg',desc:'Plant-based diet including dairy'},
    {id:'nonveg',emoji:'🍗',label:'Non-Veg',desc:'Includes meat, poultry, and seafood'},
    {id:'vegan',emoji:'🥑',label:'Vegan',desc:'Strict plant-based, no animal products'},
  ];
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('onboarding1')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:15}}>←</div>
        <div>
          <div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div>
          <div style={{fontSize:12,color:C.muted}}>Step 2 of 2</div>
        </div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:32}}>
        <div style={{height:'100%',width:'100%',background:C.primary,borderRadius:2}}/>
      </div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:27,fontWeight:700,marginBottom:28,lineHeight:1.3}}>What is your <span style={{color:C.primary}}>food preference</span>?</h1>
      {opts.map(o=>(
        <div key={o.id} className="tap" onClick={()=>setSel(o.id)} style={{background:'white',borderRadius:18,padding:'16px 20px',marginBottom:12,display:'flex',alignItems:'center',gap:14,cursor:'pointer',border:`2px solid ${sel===o.id?C.primary:'transparent'}`,transition:'border .2s'}}>
          <div style={{width:46,height:46,borderRadius:'50%',background:'#F5EFE0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{o.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{o.label}</div>
            <div style={{fontSize:13,color:C.muted,marginTop:2}}>{o.desc}</div>
          </div>
          <div style={{width:22,height:22,borderRadius:'50%',background:sel===o.id?C.primary:'transparent',border:`2px solid ${sel===o.id?C.primary:'#D0C8BC'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
            {sel===o.id&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}
          </div>
        </div>
      ))}
      <button className="tap" onClick={()=>go('createjoin')} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:C.primary,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:20,fontFamily:'DM Sans'}}>Continue</button>
    </div>
  );
};

// ── CREATE / JOIN ROOM ──────────────────────────────────────────────
const CreateJoinScreen=({go})=>{
  const[mode,setMode]=useState(null);
  const[roomName,setRoomName]=useState('');
  const[code,setCode]=useState('');
  const[copied,setCopied]=useState(false);
  const[joined,setJoined]=useState(false);
  const genCode='DISH42';
  const copy=()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);};
  const tryJoin=()=>{if(code.length===6){setJoined(true);setTimeout(()=>go('hearth'),1400);}};
  if(mode==='create') return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div className="tap" onClick={()=>setMode(null)} style={{width:38,height:38,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:28,fontSize:16}}>←</div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,marginBottom:6}}>Create your <span style={{color:C.primary}}>Family Room</span></h1>
      <p style={{color:C.muted,marginBottom:28,fontSize:14}}>Name your hearth and invite your family</p>
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:14}}>
        <label style={{fontSize:12,color:C.muted,fontWeight:600,display:'block',marginBottom:8,letterSpacing:.5}}>FAMILY ROOM NAME</label>
        <input value={roomName} onChange={e=>setRoomName(e.target.value)} placeholder="e.g. Sharma Family" style={{width:'100%',border:'none',outline:'none',fontSize:16,fontFamily:'DM Sans',color:C.text,background:'transparent'}}/>
      </div>
      {roomName.length>1&&(
        <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:24}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:600,marginBottom:10,letterSpacing:.5}}>YOUR INVITE CODE</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontFamily:'Playfair Display',fontSize:36,fontWeight:700,letterSpacing:6,color:C.primary}}>{genCode}</span>
            <button onClick={copy} style={{padding:'9px 18px',borderRadius:20,background:copied?'#4CAF50':C.dark,color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,transition:'background .3s'}}>{copied?'✓ Copied':'Copy'}</button>
          </div>
          <p style={{fontSize:12,color:C.muted,marginTop:8}}>Share this with your family to invite them</p>
        </div>
      )}
      <button className="tap" onClick={()=>go('hearth')} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:roomName.length>1?C.primary:'#D0C8BC',color:'white',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>
        Create Room & Continue
      </button>
    </div>

  const[manDone,setManDone]=useState(false);
  const process=()=>{if(!url)return;setProc(true);setTimeout(()=>{setProc(false);setDone(true);},2600);};
  const addManual=()=>{if(dishName.trim())setManDone(true);};
  return(
    <div className="fade-in" style={{paddingBottom:100,minHeight:'100vh',background:C.bg}}>
      <div style={{padding:'52px 20px 24px'}}>
        <h1 style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:24,marginBottom:4}}>Import a Dish</h1>
        <p style={{color:C.muted,fontSize:14}}>Paste an Instagram / YouTube link, or type a dish name</p>
      </div>
      <div style={{padding:'0 20px'}}>
        <div style={{background:'white',borderRadius:20,padding:'20px',marginBottom:14,boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
          <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:10,letterSpacing:.5}}>PASTE LINK</label>
          <textarea value={url} onChange={e=>{setUrl(e.target.value);setDone(false);}} placeholder="https://www.instagram.com/reel/...&#10;https://www.youtube.com/watch?v=..." style={{width:'100%',border:`1.5px solid ${C.border}`,borderRadius:12,padding:'12px 14px',fontSize:13.5,fontFamily:'DM Sans',outline:'none',resize:'none',height:80,color:C.text,lineHeight:1.5}}/>
        </div>
        {!done?(
          <button className="tap" onClick={process} disabled={!url||proc} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:url&&!proc?C.primary:'#D0C8BC',color:'white',fontSize:15,fontWeight:600,cursor:url?'pointer':'default',fontFamily:'DM Sans',display:'flex',alignItems:'center',justifyContent:'center',gap:10,transition:'background .2s',boxShadow:url&&!proc?`0 6px 20px rgba(123,37,37,.3)`:'none'}}>
            {proc?<><span style={{display:'inline-block',width:18,height:18,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'white',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>Extracting dish info...</>:'Add to Pool'}
          </button>
        ):(
          <div className="slide-up" style={{background:'#E8F5E9',borderRadius:18,padding:'22px',textAlign:'center',boxShadow:'0 4px 16px rgba(76,175,80,.15)'}}>
            <div style={{fontSize:42,marginBottom:8}}>✅</div>
            <div style={{fontWeight:700,color:'#2E7D32',marginBottom:4,fontSize:16}}>Dish added to pool!</div>
            <div style={{color:'#4CAF50',fontSize:13}}>Your family can now vote on it in Match</div>
          </div>
        )}
        <div style={{display:'flex',alignItems:'center',gap:12,margin:'24px 0'}}>
          <div style={{flex:1,height:1,background:C.border}}/>
          <span style={{color:C.muted,fontSize:13,fontWeight:500}}>or add manually</span>
          <div style={{flex:1,height:1,background:C.border}}/>
        </div>
        {!manDone?(
          <div style={{background:'white',borderRadius:20,padding:'20px',boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:8,letterSpacing:.5}}>DISH NAME</label>
              <input value={dishName} onChange={e=>setDishName(e.target.value)} placeholder="e.g. Chole Bhature" style={{width:'100%',border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',fontSize:14,fontFamily:'DM Sans',outline:'none',color:C.text}}/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:8,letterSpacing:.5}}>APPROX. CALORIES</label>
              <input type="number" placeholder="350" style={{width:'100%',border:`1.5px solid ${C.border}`,borderRadius:10,padding:'10px 14px',fontSize:14,fontFamily:'DM Sans',outline:'none',color:C.text}}/>
            </div>
            <button className="tap" onClick={addManual} style={{width:'100%',padding:'13px',borderRadius:50,border:'none',background:C.dark,color:'white',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>Add Manually</button>
          </div>
        ):(
          <div className="slide-up" style={{background:'#E8F5E9',borderRadius:18,padding:'22px',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:8}}>🍽</div>
            <div style={{fontWeight:700,color:'#2E7D32',fontSize:15}}>{dishName} added!</div>
          </div>
        )}
      </div>
      <BottomNav active="import" go={go}/>
    </div>
  );
};

// ── RECIPE MODAL ────────────────────────────────────────────────────
const RecipeModal=({dish,close})=>{
  if(!dish)return null;
  return(
    <div className="slide-up" style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,height:'100vh',background:C.bg,zIndex:200,overflowY:'auto'}}>
      <div style={{position:'relative'}}>
        <img src={dish.img} alt={dish.name} style={{width:'100%',height:270,objectFit:'cover'}}/>
        <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 50%,rgba(0,0,0,.4))'}}/>
        <button className="tap" onClick={close} style={{position:'absolute',top:52,left:20,width:40,height:40,borderRadius:'50%',background:'rgba(0,0,0,.45)',border:'none',color:'white',fontSize:17,cursor:'pointer',backdropFilter:'blur(4px)'}}>←</button>
      </div>
      <div style={{padding:'22px 20px 100px'}}>
        <h1 style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,marginBottom:10,lineHeight:1.2}}>{dish.name}</h1>
        <p style={{color:C.muted,fontStyle:'italic',fontSize:13.5,marginBottom:16,lineHeight:1.55}}>{dish.desc}</p>
        <div style={{display:'flex',gap:7,marginBottom:22,flexWrap:'wrap'}}>
          {[['🔥',dish.cal+' kcal'],['💪',dish.protein+'g protein'],['🌾',dish.carbs+'g carbs'],['🌿',dish.fiber+'g fiber']].map(([ic,v])=>(
            <span key={v} style={{background:C.light,borderRadius:50,padding:'6px 13px',fontSize:12,fontWeight:500}}>{ic} {v}</span>
          ))}
        </div>
        <h3 style={{fontFamily:'Playfair Display',fontSize:18,fontWeight:700,marginBottom:12}}>Ingredients</h3>
        <div style={{background:'white',borderRadius:18,padding:'16px 18px',marginBottom:22,boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
          {dish.ingredients.map((ing,i)=>(
            <div key={i} style={{display:'flex',gap:12,padding:'9px 0',borderBottom:i<dish.ingredients.length-1?`1px solid ${C.border}`:'none',alignItems:'flex-start'}}>
              <span style={{color:C.primary,fontWeight:800,flexShrink:0,marginTop:1}}>·</span>
              <span style={{fontSize:14,lineHeight:1.4}}>{ing}</span>
            </div>
          ))}
        </div>
        <h3 style={{fontFamily:'Playfair Display',fontSize:18,fontWeight:700,marginBottom:14}}>How to Make</h3>
        {dish.steps.map((step,i)=>(
          <div key={i} style={{display:'flex',gap:12,marginBottom:14,alignItems:'flex-start'}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:C.primary,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
            <p style={{fontSize:14,lineHeight:1.65,paddingTop:4,color:C.text}}>{step}</p>
          </div>
        ))}
      </div>
    </div>
  );
};

// ── ROOT APP ─────────────────────────────────────────────────────────
const App=()=>{
  const[screen,setScreen]=useState('welcome');
  const[recipe,setRecipe]=useState(null);
  const go=s=>{
    const map={hearth:'hearth',import:'import',match:'match',planner:'planner'};
    setScreen(map[s]||s);
    window.scrollTo(0,0);
  };
  const screens={
    welcome:<WelcomeScreen go={go}/>,
    onboarding1:<Onboarding1 go={go}/>,
    onboarding2:<Onboarding2 go={go}/>,
    createjoin:<CreateJoinScreen go={go}/>,
    hearth:<HearthScreen go={go} showRecipe={setRecipe}/>,
    match:<MatchScreen go={go} showRecipe={setRecipe}/>,
    planner:<PlannerScreen go={go} showRecipe={setRecipe}/>,
    import:<ImportScreen go={go}/>,
  };
  return(
    <>
      {screens[screen]||screens.welcome}
      {recipe&&<RecipeModal dish={recipe} close={()=>setRecipe(null)}/>}
    </>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
