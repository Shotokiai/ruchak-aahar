<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Culinary Hearth</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1A1A1A;display:flex;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
    #root{width:100%;max-width:390px;min-height:100vh;background:#F5EFE0;overflow-x:hidden;position:relative;}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#E0D8CC;outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;box-shadow:0 2px 8px rgba(123,37,37,.4);}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;border:none;}
    ::-webkit-scrollbar{width:0;}
    .fade-in{animation:fadeIn .3s ease;}
    .slide-up{animation:slideUp .35s cubic-bezier(.4,0,.2,1);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tap:active{transform:scale(.96);transition:transform .1s;}
    .vote-skip:active{transform:scale(.88) rotate(-5deg);}
    .vote-love:active{transform:scale(.88);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const C={bg:'#F5EFE0',primary:'#7B2525',dark:'#1A1A1A',card:'#FFFFFF',text:'#1A1A1A',muted:'#9A8E82',green:'#4CAF50',border:'#E8DDD0',light:'#F0E8DC'};

const DISH_POOL=[
  {id:1,name:"Dal Makhani",img:"https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=500&q=80",protein:32,carbs:18,fiber:6,cal:280,desc:'"Yeh sirf dal nahi, emotional support system hai foodie logon ka"',by:"Admin",ingredients:["1 cup whole black lentils","¼ cup kidney beans","2 tbsp butter","1 cup tomato puree","1 tsp cumin","½ cup cream","Salt to taste"],steps:["Soak lentils overnight","Pressure cook 6-8 whistles","Cook butter + tomato puree till oil separates","Add cream + lentils, simmer 25 mins","Garnish with cream and serve hot"]},
  {id:2,name:"Roasted Salmon & Spring Greens",img:"https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=500&q=80",protein:15,carbs:38,fiber:9,cal:320,desc:'"A light, fresh meal for a busy Tuesday. Quick 20-min prep."',by:"Admin",ingredients:["2 salmon fillets","1 bunch asparagus","2 cups baby spinach","1 lemon","3 tbsp olive oil","2 garlic cloves"],steps:["Preheat oven to 200°C","Season salmon with garlic, lemon, salt","Roast salmon and asparagus 15-18 mins","Sauté spinach with olive oil","Plate together with lemon wedge"]},
  {id:3,name:"Butter Chicken",img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?w=500&q=80",protein:28,carbs:22,fiber:4,cal:340,desc:'"The OG comfort food. A warm hug in curry form."',by:"Admin",ingredients:["500g chicken","200ml cream","2 cups tomato puree","3 tbsp butter","2 tsp garam masala"],steps:["Marinate chicken in yogurt + spices 1 hr","Grill till lightly charred","Butter + onion + tomato sauce","Add cream, simmer 15 mins","Add chicken, cook 10 more mins"]},
  {id:4,name:"Paneer Tikka",img:"https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=500&q=80",protein:24,carbs:14,fiber:3,cal:260,desc:'"Vegetarians deserve drama too — every single time."',by:"Admin",ingredients:["400g paneer, cubed","1 cup yogurt","2 tbsp tikka masala","1 capsicum","Chaat masala + lemon"],steps:["Marinate paneer + veggies 2 hours","Thread on skewers","Grill 10-12 mins, turn once","Dust chaat masala and lemon","Serve with mint chutney"]},
  {id:5,name:"Chicken Biryani",img:"https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&q=80",protein:35,carbs:52,fiber:5,cal:480,desc:'"Sunday ki feeling, any day of the week. No further questions."',by:"Admin",ingredients:["500g chicken","2 cups basmati rice","Whole spices","Saffron in warm milk","Fried onions","3 tbsp ghee"],steps:["Marinate chicken 3 hours","Par-cook rice to 70%","Layer rice and chicken in pot","Add saffron milk + fried onions + mint","Dum cook on low heat 25-30 mins"]}
];

/* ── ICONS ── */
const HouseIcon=({a})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.55 20.55 21 20 21H15V15H9V21H4C3.45 21 3 20.55 3 20V9Z" stroke={a?'white':C.muted} strokeWidth="2" fill={a?'white':'none'}/></svg>;
const MatchIcon=({a})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 21C12 21 3 15 3 8.5C3 6 5 4 7.5 4C9.24 4 10.91 4.96 12 6.5C13.09 4.96 14.76 4 16.5 4C19 4 21 6 21 8.5C21 15 12 21 12 21Z" stroke={a?'white':C.muted} strokeWidth="2" fill={a?'white':'none'}/></svg>;
const PlanIcon=({a})=><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke={a?'white':C.muted} strokeWidth="2"/><path d="M16 2V6M8 2V6M3 10H21" stroke={a?'white':C.muted} strokeWidth="2" strokeLinecap="round"/><circle cx="8" cy="15" r="1.5" fill={a?'white':C.muted}/><circle cx="12" cy="15" r="1.5" fill={a?'white':C.muted}/></svg>;
const GoogleG=()=><svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>;

/* ── BOTTOM NAV — 3 tabs only ── */
const BottomNav=({active,go})=>{
  const tabs=[
    {id:'hearth',label:'Hearth',icon:<HouseIcon a={active==='hearth'}/>},
    {id:'match',label:'Match',icon:<MatchIcon a={active==='match'}/>},
    {id:'planner',label:'Planner',icon:<PlanIcon a={active==='planner'}/>},
  ];
  return(
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,background:'white',borderTop:`1px solid ${C.border}`,padding:'10px 8px 22px',display:'flex',justifyContent:'space-around',zIndex:100,boxShadow:'0 -4px 20px rgba(0,0,0,.06)'}}>
      {tabs.map(t=>(
        <div key={t.id} className="tap" onClick={()=>go(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,cursor:'pointer',minWidth:80}}>
          <div style={{width:48,height:48,borderRadius:'50%',background:active===t.id?C.primary:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}>{t.icon}</div>
          <span style={{fontSize:11,color:active===t.id?C.primary:C.muted,fontWeight:active===t.id?600:400}}>{t.label}</span>
        </div>
      ))}
    </div>
  );
};

/* ── STICKY TOP NAV (reusable) ── */
const StickyNav=({left,right})=>(
  <div style={{position:'sticky',top:0,zIndex:50,background:'white',borderBottom:`1px solid ${C.border}`,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>
    <div style={{flex:1}}>{left}</div>
    {right||<div style={{width:38}}/>}
  </div>
);

/* ── SLIDER CARD ── */
const SliderCard=({label,val,rawVal,set,min,max,lo,hi,suffix=''})=>(
  <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:500,maxWidth:'62%'}}>{label}</div>
      <span style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:C.primary}}>{val}{suffix}</span>
    </div>
    <input type="range" min={min} max={max} value={rawVal||val} onChange={e=>set(+e.target.value)}/>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}><span>{lo}</span><span>{hi}</span></div>
  </div>
);

/* ══════════════════════════════════════════
   SCREENS
══════════════════════════════════════════ */

/* ── WELCOME ── */
const WelcomeScreen=({go})=>{
  const[slide,setSlide]=useState(0);
  const slides=[
    {img:"https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&q=80",title:"No more dinner debates",desc:'Turn "What\'s for dinner?" into a celebration. We handle the consensus so you can focus on the cooking.'},
    {img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=500&q=80",title:"AI-powered recipe extraction",desc:"Transform food reels and long-winded blogs into clean, structured cooking steps instantly."},
    {img:"https://images.unsplash.com/photo-1547592180-85f173990554?w=500&q=80",title:"Family-wide voting",desc:"Give everyone a seat at the table. Cast votes on the weekly menu and find meals everyone loves."}
  ];
  useEffect(()=>{const t=setInterval(()=>setSlide(s=>(s+1)%3),3800);return()=>clearInterval(t);},[]);
  const s=slides[slide];
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100vh',padding:'52px 24px 40px',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:32}}>
        <div style={{width:38,height:38,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:18,color:'white'}}>🍽</span></div>
        <span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:17,color:C.primary}}>The Culinary Hearth</span>
      </div>
      <div style={{borderRadius:28,overflow:'hidden',height:268,marginBottom:28,boxShadow:'0 12px 32px rgba(0,0,0,.14)'}}>
        <img src={s.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
      </div>
      <div style={{flex:1,minHeight:90}}>
        <h1 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,marginBottom:10,lineHeight:1.25}}>{s.title}</h1>
        <p style={{color:C.muted,fontSize:14.5,lineHeight:1.65}}>{s.desc}</p>
      </div>
      <div style={{display:'flex',gap:7,justifyContent:'center',margin:'16px 0 22px'}}>
        {[0,1,2].map(i=><div key={i} onClick={()=>setSlide(i)} style={{height:6,borderRadius:3,background:i===slide?C.primary:'#D8CFBF',width:i===slide?28:8,transition:'all .3s',cursor:'pointer'}}/>)}
      </div>
      <button className="tap" onClick={()=>go('onboarding1')} style={{width:'100%',padding:'15px',borderRadius:50,border:'2px solid #1A1A1A',background:'white',display:'flex',alignItems:'center',justifyContent:'center',gap:12,fontSize:15,fontWeight:600,cursor:'pointer',marginBottom:14,fontFamily:'DM Sans'}}>
        <GoogleG/> Sign in with Google
      </button>
      <p style={{textAlign:'center',color:C.muted,fontSize:13.5}}>Already have a hearth? <span onClick={()=>go('hearth')} style={{color:C.primary,fontWeight:600,cursor:'pointer'}}>Log in</span></p>
    </div>
  );
};

/* ── ONBOARDING 1 — captures name ── */
const Onboarding1=({go,setUserName})=>{
  const[name,setName]=useState('');
  const[age,setAge]=useState(28);
  const[wt,setWt]=useState(165);
  const[ht,setHt]=useState(71);
  const[unit,setUnit]=useState('inch');
  const fmtHt=i=>unit==='inch'?`${Math.floor(i/12)}'${i%12}"`:`${Math.round(i*2.54)} cm`;
  const next=()=>{if(name.trim()){setUserName(name.trim());go('onboarding2');}};
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('welcome')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:15}}>✕</div>
        <div><div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div><div style={{fontSize:12,color:C.muted}}>Step 1 of 2</div></div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:28}}><div style={{height:'100%',width:'50%',background:C.primary,borderRadius:2}}/></div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:27,fontWeight:700,marginBottom:24,lineHeight:1.3}}>Let's get to know <span style={{color:C.primary}}>the chef.</span></h1>

      {/* Name — comes from Google in real app */}
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
        <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:8,letterSpacing:.5}}>YOUR NAME</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Sushma" style={{width:'100%',border:'none',outline:'none',fontSize:18,fontFamily:'Playfair Display',fontWeight:600,color:C.text,background:'transparent'}}/>
        <div style={{fontSize:11,color:C.muted,marginTop:6}}>With Google Sign-In, this is fetched from your profile automatically.</div>
      </div>

      <SliderCard label="What is your age?" val={age} set={setAge} min={13} max={100} lo="13" hi="100"/>
      <SliderCard label="Body weight?" val={`${wt}`} rawVal={wt} set={setWt} min={80} max={350} lo="80 lbs" hi="350 lbs" suffix=" lbs"/>
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>What is your height?</div>
            <div style={{display:'flex',gap:4}}>
              {['inch','cm'].map(u=><span key={u} onClick={()=>setUnit(u)} style={{padding:'3px 12px',borderRadius:20,fontSize:12,background:unit===u?C.dark:'#F0E8DC',color:unit===u?'white':C.muted,cursor:'pointer',fontWeight:500,transition:'all .2s'}}>{u}</span>)}
            </div>
          </div>
          <span style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:C.primary}}>{fmtHt(ht)}</span>
        </div>
        <input type="range" min={48} max={96} value={ht} onChange={e=>setHt(+e.target.value)}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}><span>4'0"</span><span>8'0"</span></div>
      </div>
      <button className="tap" onClick={next} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:name.trim()?C.primary:'#D0C8BC',color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:8,fontFamily:'DM Sans',transition:'background .2s'}}>
        Continue to Preferences →
      </button>
    </div>
  );
};

/* ── ONBOARDING 2 ── */
const Onboarding2=({go})=>{
  const[sel,setSel]=useState('nonveg');
  const opts=[{id:'veg',emoji:'🥗',label:'Veg',desc:'Plant-based diet including dairy'},{id:'nonveg',emoji:'🍗',label:'Non-Veg',desc:'Includes meat, poultry, and seafood'},{id:'vegan',emoji:'🥑',label:'Vegan',desc:'Strict plant-based, no animal products'}];
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('onboarding1')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:15}}>←</div>
        <div><div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div><div style={{fontSize:12,color:C.muted}}>Step 2 of 2</div></div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:28}}><div style={{height:'100%',width:'100%',background:C.primary,borderRadius:2}}/></div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:27,fontWeight:700,marginBottom:28,lineHeight:1.3}}>What is your <span style={{color:C.primary}}>food preference</span>?</h1>
      {opts.map(o=>(
        <div key={o.id} className="tap" onClick={()=>setSel(o.id)} style={{background:'white',borderRadius:18,padding:'16px 20px',marginBottom:12,display:'flex',alignItems:'center',gap:14,cursor:'pointer',border:`2px solid ${sel===o.id?C.primary:'transparent'}`,transition:'border .2s'}}>
          <div style={{width:46,height:46,borderRadius:'50%',background:'#F5EFE0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{o.emoji}</div>
          <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15}}>{o.label}</div><div style={{fontSize:13,color:C.muted,marginTop:2}}>{o.desc}</div></div>
          <div style={{width:22,height:22,borderRadius:'50%',background:sel===o.id?C.primary:'transparent',border:`2px solid ${sel===o.id?C.primary:'#D0C8BC'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}}>
            {sel===o.id&&<span style={{color:'white',fontSize:11,fontWeight:700}}>✓</span>}
          </div>
        </div>
      ))}
      <button className="tap" onClick={()=>go('createjoin')} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:C.primary,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:20,fontFamily:'DM Sans'}}>Continue</button>
    </div>
  );
};

/* ── CREATE / JOIN ROOM ── */
const CreateJoinScreen=({go,userName})=>{
  const[mode,setMode]=useState(null);
  const[roomName,setRoomName]=useState('');
  const[code,setCode]=useState('');
  const[copied,setCopied]=useState(false);
  const[status,setStatus]=useState('');
  if(mode==='create') return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div className="tap" onClick={()=>setMode(null)} style={{width:38,height:38,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:28,fontSize:16}}>←</div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,marginBottom:6}}>Create your <span style={{color:C.primary}}>Family Room</span></h1>
      <p style={{color:C.muted,marginBottom:28,fontSize:14}}>Name your hearth and invite your family</p>
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:14}}>
        <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:8,letterSpacing:.5}}>FAMILY ROOM NAME</label>
        <input value={roomName} onChange={e=>setRoomName(e.target.value)} placeholder="e.g. Sharma Family" style={{width:'100%',border:'none',outline:'none',fontSize:16,fontFamily:'DM Sans',color:C.text,background:'transparent'}}/>
      </div>
      {roomName.length>1&&(
        <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:24}}>
          <div style={{fontSize:12,color:C.muted,fontWeight:700,marginBottom:10,letterSpacing:.5}}>YOUR INVITE CODE</div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontFamily:'Playfair Display',fontSize:36,fontWeight:700,letterSpacing:6,color:C.primary}}>DISH42</span>
            <button onClick={()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{padding:'9px 18px',borderRadius:20,background:copied?'#4CAF50':C.dark,color:'white',border:'none',cursor:'pointer',fontSize:13,fontWeight:600,transition:'background .3s'}}>{copied?'✓ Copied':'Copy'}</button>
          </div>
          <p style={{fontSize:12,color:C.muted,marginTop:8}}>Share this with your family to invite them</p>
        </div>
      )}
      <button className="tap" onClick={()=>go('hearth')} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:roomName.length>1?C.primary:'#D0C8BC',color:'white',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>
        Create Room & Continue
      </button>
    </div>
  );
  if(mode==='join') return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div className="tap" onClick={()=>setMode(null)} style={{width:38,height:38,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:28,fontSize:16}}>←</div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:28,fontWeight:700,marginBottom:6}}>Join a <span style={{color:C.primary}}>Family Room</span></h1>
      <p style={{color:C.muted,marginBottom:28,fontSize:14}}>Enter the 6-character invite code</p>
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:16}}>
        <label style={{fontSize:12,color:C.muted,fontWeight:700,display:'block',marginBottom:10,letterSpacing:.5}}>INVITE CODE</label>
        <input value={code} onChange={e=>{setCode(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6));setStatus('');}} placeholder="DISH42" maxLength={6} style={{width:'100%',border:'none',outline:'none',fontSize:36,fontFamily:'Playfair Display',fontWeight:700,letterSpacing:6,color:C.primary,background:'transparent'}}/>
      </div>

/* ══ MATCH SCREEN ══ */
const MatchScreen=({go,showRecipe,dishPool,votes,onVote})=>{
  const[tab,setTab]=useState('notVoted');
  const[anim,setAnim]=useState(null);
  const unvoted=dishPool.filter(d=>votes[d.id]===undefined);
  const myVotes=dishPool.filter(d=>votes[d.id]!==undefined);
  const currentDish=unvoted[0];
  const tabDef=[
    {id:'all',label:'All Dishes',count:dishPool.length},
    {id:'notVoted',label:'Not Voted Yet',count:unvoted.length},
    {id:'myVotes',label:'My Votes',count:myVotes.length},
  ];
  const vote=liked=>{
    if(!currentDish)return;
    setAnim(liked?'right':'left');
    setTimeout(()=>{onVote(currentDish.id,liked);setAnim(null);},260);
  };
  return(
    <div style={{paddingBottom:100,minHeight:'100vh',background:C.bg}}>
      {/* TOP NAV — no bell, no extra space */}
      <StickyNav left={<span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:20,color:C.primary}}>Tonight's Contenders</span>}/>

      {/* TABS */}
      <div style={{display:'flex',background:'white',borderBottom:`1px solid ${C.border}`}}>
        {tabDef.map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'11px 4px',textAlign:'center',cursor:'pointer',borderBottom:`2.5px solid ${tab===t.id?C.primary:'transparent'}`,transition:'border-color .2s'}}>
            <div style={{fontSize:12,fontWeight:tab===t.id?700:500,color:tab===t.id?C.primary:C.muted,transition:'color .2s'}}>
              {t.label}
              {t.count>0&&<span style={{marginLeft:4,background:tab===t.id?C.primary:'#E8DDD0',color:tab===t.id?'white':C.muted,borderRadius:20,padding:'1px 6px',fontSize:10.5,fontWeight:700}}>{t.count}</span>}
            </div>
          </div>
        ))}
      </div>

      <div style={{padding:'14px 20px'}}>
        {/* NOT VOTED YET */}
        {tab==='notVoted'&&(
          currentDish?(
            <>
              {/* Progress */}
              <div style={{display:'flex',gap:4,marginBottom:14}}>
                {dishPool.map((d,i)=>{const done=votes[d.id]!==undefined;return<div key={i} style={{flex:1,height:3,borderRadius:2,background:done?C.primary:'#E0D8CC',opacity:done?.4:1}}/>;} )}
              </div>
              <div style={{marginBottom:18}}>
                <div style={{borderRadius:22,overflow:'hidden',background:'white',transform:anim==='left'?'translateX(-70px) rotate(-9deg)':anim==='right'?'translateX(70px) rotate(9deg)':'none',opacity:anim?0:1,transition:'all .25s cubic-bezier(.4,0,.2,1)',boxShadow:'0 10px 40px rgba(0,0,0,.12)'}}>
                  <div style={{position:'relative',height:295}}>
                    <img src={currentDish.img} alt={currentDish.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 50%,rgba(0,0,0,.72)'}}/>
                    <div style={{position:'absolute',bottom:18,left:20}}>
                      <h2 style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:'white'}}>{currentDish.name}</h2>
                    </div>
                  </div>
                  <div style={{padding:'14px 18px 18px'}}>
                    <div style={{display:'flex',gap:7,marginBottom:11,flexWrap:'wrap'}}>
                      {[['🔩','PROTEIN',currentDish.protein+'G'],['📊','CARBS',currentDish.carbs+'G'],['🌿','FIBER',currentDish.fiber+'G']].map(([ic,lb,vl])=>(
                        <div key={lb} style={{background:C.light,borderRadius:50,padding:'5px 10px',display:'flex',alignItems:'center',gap:5,fontSize:11.5,fontWeight:600}}><span>{ic}</span>{lb} {vl}</div>
                      ))}
                    </div>
                    <p style={{color:C.muted,fontSize:13,fontStyle:'italic',lineHeight:1.5,marginBottom:8}}>{currentDish.desc}</p>
                    <div onClick={()=>showRecipe(currentDish)} style={{textAlign:'right',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer',letterSpacing:.8}}>VIEW RECIPE →</div>
                  </div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:26}}>
                <button className="vote-skip" onClick={()=>vote(false)} style={{width:64,height:64,borderRadius:'50%',background:'white',border:'none',fontSize:22,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 18px rgba(0,0,0,.1)',color:C.muted}}>✕</button>
                <button className="vote-love" onClick={()=>vote(true)} style={{width:80,height:80,borderRadius:'50%',background:C.primary,border:'none',fontSize:28,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 28px rgba(123,37,37,.4)`}}>❤️</button>
              </div>
              <div style={{textAlign:'center',marginTop:10,color:C.muted,fontSize:12}}>{unvoted.length} dish{unvoted.length!==1?'es':''} left</div>
            </>
          ):(
            <div style={{textAlign:'center',padding:'52px 0'}}>
              <div style={{fontSize:54,marginBottom:12}}>✅</div>
              <h3 style={{fontFamily:'Playfair Display',fontSize:20,fontWeight:700,marginBottom:8}}>All caught up!</h3>
              <p style={{color:C.muted,fontSize:13.5}}>You've voted on everything.<br/>Check "My Votes" to see your picks.</p>
            </div>
          )
        )}
        {/* ALL DISHES */}
        {tab==='all'&&(
          dishPool.length>0?dishPool.map(d=><DishListCard key={d.id} dish={d} voteVal={votes[d.id]} onVote={votes[d.id]===undefined?onVote:undefined} showRecipe={showRecipe}/>)
          :<div style={{textAlign:'center',padding:'48px 0',color:C.muted,fontSize:13.5}}>No dishes in pool yet</div>
        )}
        {/* MY VOTES */}
        {tab==='myVotes'&&(
          myVotes.length>0?myVotes.map(d=><DishListCard key={d.id} dish={d} voteVal={votes[d.id]} showRecipe={showRecipe}/>)
          :(
            <div style={{textAlign:'center',padding:'52px 0'}}>
              <div style={{fontSize:50,marginBottom:12}}>🗳</div>
              <p style={{color:C.muted,fontSize:13.5}}>Your votes appear here.<br/>Head to "Not Voted Yet" to start!</p>
            </div>
          )
        )}
      </div>
      <BottomNav active="match" go={go}/>
    </div>
  );
};

/* ══ PLANNER SCREEN ══ */
const PlannerScreen=({go,showRecipe,isAdmin,plannedMeals,setPlannedMeals})=>{
  const[selDay,setSelDay]=useState(2);
  const[addTarget,setAddTarget]=useState(null);
  const[repeatTarget,setRepeatTarget]=useState(null);
  const[openMenu,setOpenMenu]=useState(null);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dates=[7,8,9,10,11,12,13];
  const hours=['7 AM','8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM','7 PM','8 PM','9 PM'];
  const key=(d,h)=>`${d}_${h}`;
  const getMeal=(d,h)=>plannedMeals[key(d,h)]||null;
  const addMeal=(d,h,dish)=>setPlannedMeals(p=>({...p,[key(d,h)]:{dish,repeat:'once'}}));
  const removeMeal=(d,h)=>setPlannedMeals(p=>{const n={...p};delete n[key(d,h)];return n;});
  const setRepeat=(d,h,rep)=>setPlannedMeals(p=>({...p,[key(d,h)]:{...p[key(d,h)],repeat:rep}}));
  const dayHasMeal=i=>hours.some(h=>getMeal(i,h));
  const repeatLabel={once:'',daily:'Every day',weekly:'Every week',monthly:'Every month'};
  return(
    <div style={{paddingBottom:100,minHeight:'100vh',background:C.bg}} onClick={()=>setOpenMenu(null)}>
      {/* TOP NAV — no cart, no ••• */}
      <StickyNav left={<span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:20}}>Meal Plan</span>}/>

      {/* Week picker */}
      <div style={{background:'white',margin:'12px 20px',borderRadius:18,padding:'14px',boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontSize:15}}>📅</span><span style={{fontWeight:600,fontSize:14}}>April 2025</span></div>
          <div style={{display:'flex',gap:8,alignItems:'center',fontSize:13,color:C.muted,cursor:'pointer'}}><span>◀</span><span style={{fontWeight:600}}>Today</span><span>▶</span></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {days.map((d,i)=>(
            <div key={d} onClick={()=>setSelDay(i)} style={{textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:10.5,color:C.muted,marginBottom:5,fontWeight:500}}>{d}</div>
              <div style={{width:32,height:32,borderRadius:'50%',margin:'0 auto',background:selDay===i?C.primary:'transparent',color:selDay===i?'white':C.text,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:selDay===i?700:400,fontSize:14,transition:'all .2s'}}>{dates[i]}</div>
              <div style={{width:'60%',height:3,borderRadius:2,background:dayHasMeal(i)?C.primary:'#E0D8CC',margin:'5px auto 0',opacity:.7}}/>
            </div>
          ))}
        </div>
      </div>

      {/* Timeline */}
      <div style={{padding:'0 20px'}}>
        {hours.map(t=>{
          const meal=getMeal(selDay,t);
          const menuKey=`${selDay}_${t}`;
          return(
            <div key={t} style={{display:'flex',gap:10,alignItems:'flex-start',minHeight:meal?98:40}} onClick={e=>e.stopPropagation()}>
              <div style={{width:44,fontSize:12,color:C.muted,paddingTop:12,flexShrink:0,textAlign:'right'}}>{t}</div>
              <div style={{flex:1,borderLeft:`1.5px solid ${C.border}`,paddingLeft:12,paddingBottom:4,paddingTop:8}}>
                {meal?(
                  <div style={{background:'white',borderRadius:14,padding:'10px 12px',display:'flex',gap:10,alignItems:'center',boxShadow:'0 2px 10px rgba(0,0,0,.06)',position:'relative'}}>
                    {meal.dish.img
                      ?<img src={meal.dish.img} alt="" style={{width:46,height:46,borderRadius:10,objectFit:'cover',flexShrink:0}}/>
                      :<div style={{width:46,height:46,borderRadius:10,background:C.light,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>🍽</div>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13.5,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meal.dish.name}</div>
                      {/* Macros visible to all */}
                      <div style={{fontSize:11,color:C.muted}}>🔥{meal.dish.cal} · 💪{meal.dish.protein}g · 🌾{meal.dish.carbs}g · 🌿{meal.dish.fiber}g</div>
                      {meal.repeat&&meal.repeat!=='once'&&<div style={{fontSize:10,color:C.primary,fontWeight:600,marginTop:3}}>🔄 {repeatLabel[meal.repeat]}</div>}
                    </div>
                    {/* 3-dot menu — for everyone (admin gets more options) */}
                    <div style={{position:'relative',flexShrink:0}}>
                      <div onClick={e=>{e.stopPropagation();setOpenMenu(openMenu===menuKey?null:menuKey);}} style={{width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',background:'#F5EFE0',fontSize:11,color:C.muted,fontWeight:900,letterSpacing:1}}>•••</div>
                      {openMenu===menuKey&&(
                        <div style={{position:'absolute',right:0,top:32,background:'white',borderRadius:12,boxShadow:'0 4px 24px rgba(0,0,0,.16)',zIndex:80,overflow:'hidden',minWidth:170}} onClick={e=>e.stopPropagation()}>
                          <div onClick={()=>{setOpenMenu(null);showRecipe(meal.dish);}} style={{padding:'12px 16px',fontSize:13,fontWeight:500,cursor:'pointer',borderBottom:`1px solid ${C.border}`}}>🍽 View Recipe</div>
                          <div onClick={()=>{setOpenMenu(null);setRepeatTarget({hour:t,meal:meal.dish});}} style={{padding:'12px 16px',fontSize:13,fontWeight:500,cursor:'pointer',borderBottom:isAdmin?`1px solid ${C.border}`:'none'}}>🔄 Set Repeat Schedule</div>
                          {isAdmin&&<div onClick={()=>{setOpenMenu(null);removeMeal(selDay,t);}} style={{padding:'12px 16px',fontSize:13,fontWeight:500,cursor:'pointer',color:'#E53935'}}>🗑 Remove from Day</div>}
                        </div>
                      )}
                    </div>
                  </div>
                ):(
                  <div onClick={()=>setAddTarget({hour:t})} style={{color:C.border,fontSize:22,cursor:'pointer',lineHeight:1,display:'inline-block',paddingTop:2,userSelect:'none'}}>+</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <BottomNav active="planner" go={go}/>
      {addTarget&&<AddDishModal onAdd={d=>{addMeal(selDay,addTarget.hour,d);setAddTarget(null);}} onClose={()=>setAddTarget(null)}/>}
      {repeatTarget&&<RepeatModal dishName={repeatTarget.meal.name} onSelect={rep=>setRepeat(selDay,repeatTarget.hour,rep)} onClose={()=>setRepeatTarget(null)}/>}
    </div>
  );
};

/* ── RECIPE MODAL ── */
const RecipeModal=({dish,close})=>{
  if(!dish)return null;
  return(
    <div className="slide-up" style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,height:'100vh',background:C.bg,zIndex:200,overflowY:'auto'}}>
      <div style={{position:'relative'}}>
        {dish.img?<img src={dish.img} alt={dish.name} style={{width:'100%',height:256,objectFit:'cover'}}/>:<div style={{height:120,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:48}}>🍽</div>}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 50%,rgba(0,0,0,.28))'}}/>
        <button className="tap" onClick={close} style={{position:'absolute',top:48,left:20,width:40,height:40,borderRadius:'50%',background:'rgba(0,0,0,.45)',border:'none',color:'white',fontSize:17,cursor:'pointer'}}>←</button>
      </div>
      <div style={{padding:'20px 20px 100px'}}>
        <h1 style={{fontFamily:'Playfair Display',fontSize:24,fontWeight:700,marginBottom:10,lineHeight:1.2}}>{dish.name}</h1>
        {dish.desc&&<p style={{color:C.muted,fontStyle:'italic',fontSize:13,marginBottom:14,lineHeight:1.5}}>{dish.desc}</p>}
        <div style={{display:'flex',gap:7,marginBottom:18,flexWrap:'wrap'}}>
          {[['🔥',(dish.cal||0)+' kcal'],['💪',(dish.protein||0)+'g protein'],['🌾',(dish.carbs||0)+'g carbs'],['🌿',(dish.fiber||0)+'g fiber']].map(([ic,v])=>(
            <span key={v} style={{background:C.light,borderRadius:50,padding:'5px 12px',fontSize:12,fontWeight:500}}>{ic} {v}</span>
          ))}
        </div>
        {dish.ingredients&&<>
          <h3 style={{fontFamily:'Playfair Display',fontSize:17,fontWeight:700,marginBottom:10}}>Ingredients</h3>
          <div style={{background:'white',borderRadius:16,padding:'12px 16px',marginBottom:18}}>
            {dish.ingredients.map((ing,i)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'7px 0',borderBottom:i<dish.ingredients.length-1?`1px solid ${C.border}`:'none',alignItems:'flex-start'}}>
                <span style={{color:C.primary,fontWeight:800,flexShrink:0}}>·</span>
                <span style={{fontSize:13.5,lineHeight:1.4}}>{ing}</span>
              </div>
            ))}
          </div>
        </>}
        {dish.steps&&<>
          <h3 style={{fontFamily:'Playfair Display',fontSize:17,fontWeight:700,marginBottom:12}}>How to Make</h3>
          {dish.steps.map((step,i)=>(
            <div key={i} style={{display:'flex',gap:12,marginBottom:12,alignItems:'flex-start'}}>
              <div style={{width:26,height:26,borderRadius:'50%',background:C.primary,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <p style={{fontSize:13.5,lineHeight:1.65,paddingTop:4}}>{step}</p>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
};

/* ══ ROOT APP ══ */
const App=()=>{
  const[screen,setScreen]=useState('welcome');
  const[recipe,setRecipe]=useState(null);
  const[userName,setUserName]=useState('');
  const[members,setMembers]=useState([]);
  const[votes,setVotes]=useState({});
  const[plannedMeals,setPlannedMeals]=useState({});
  const isAdmin=true;

  useEffect(()=>{
    if(userName) setMembers([{id:1,name:userName,role:'admin',initials:userName.slice(0,2).toUpperCase(),eating:true,color:'#D4956A'}]);
  },[userName]);

  const go=s=>{const m={hearth:'hearth',match:'match',planner:'planner'};setScreen(m[s]||s);window.scrollTo(0,0);};
  const onVote=(id,liked)=>setVotes(v=>({...v,[id]:liked}));

  const screens={
    welcome:<WelcomeScreen go={go}/>,
    onboarding1:<Onboarding1 go={go} setUserName={setUserName}/>,
    onboarding2:<Onboarding2 go={go}/>,
    createjoin:<CreateJoinScreen go={go} userName={userName}/>,
    hearth:<HearthScreen go={go} showRecipe={setRecipe} userName={userName} members={members} plannedMeals={plannedMeals} isAdmin={isAdmin}/>,
    match:<MatchScreen go={go} showRecipe={setRecipe} dishPool={DISH_POOL} votes={votes} onVote={onVote}/>,
    planner:<PlannerScreen go={go} showRecipe={setRecipe} isAdmin={isAdmin} plannedMeals={plannedMeals} setPlannedMeals={setPlannedMeals}/>,
  };

  return(
    <>
      {screens[screen]||screens.welcome}
      {recipe&&<RecipeModal dish={recipe} close={()=>setRecipe(null)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
