<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1A1A1A;display:flex;justify-content:center;min-height:100vh;font-family:'DM Sans',sans-serif;}
    #root{width:100%;max-width:390px;min-height:100vh;background:#F5EFE0;overflow-x:hidden;position:relative;}
    input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#E0D8CC;outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;box-shadow:0 2px 8px rgba(123,37,37,.4);}
    input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#7B2525;cursor:pointer;border:none;}
    ::-webkit-scrollbar{width:0;}
    .fade-in{animation:fadeIn .3s ease;}
    .slide-up{animation:slideUp .35s cubic-bezier(.4,0,.2,1);}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tap:active{transform:scale(.96);transition:transform .1s;}
    .vote-skip:active{transform:scale(.88) rotate(-6deg);}
    .vote-love:active{transform:scale(.88);}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const C={bg:'#F5EFE0',primary:'#7B2525',dark:'#1A1A1A',card:'#FFFFFF',text:'#1A1A1A',muted:'#9A8E82',green:'#4CAF50',border:'#E8DDD0',light:'#F0E8DC'};

/* ── CALORIE CALC (Mifflin-St Jeor BMR × activity multiplier) ──
   age: years | weightKg: kg | heightCm: cm | gender: 'm'|'f'
   activity: 'sedentary'|'light'|'moderate'
   Returns daily maintenance kcal (rounded to nearest 10)         */
const calcMaintenance=(age,weightKg,heightCm,gender='m',activity='sedentary')=>{
  const bmr = gender==='m'
    ? 10*weightKg + 6.25*heightCm - 5*age + 5
    : 10*weightKg + 6.25*heightCm - 5*age - 161;
  const mult={sedentary:1.2,light:1.375,moderate:1.55};
  return Math.round((bmr*(mult[activity]||1.2))/10)*10;
};

const DISH_POOL=[
  {id:1,name:"Dal Makhani",img:"https://images.unsplash.com/photo-1585937421612-70a008356fbe?w=500&q=80",protein:32,carbs:18,fiber:6,cal:280,desc:'"Yeh sirf dal nahi, emotional support system hai foodie logon ka"',by:"Admin",ingredients:["1 cup whole black lentils","¼ cup kidney beans","2 tbsp butter","1 cup tomato puree","1 tsp cumin","½ cup cream","Salt to taste"],steps:["Soak lentils overnight","Pressure cook 6-8 whistles","Cook butter + tomato puree till oil separates","Add cream + lentils, simmer 25 mins","Garnish with cream and serve hot"]},

  {id:5,name:"Chicken Biryani",img:"https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&q=80",protein:35,carbs:52,fiber:5,cal:480,desc:'"Sunday ki feeling, any day of the week."',by:"Admin",ingredients:["500g chicken","2 cups basmati","Whole spices","Saffron milk","Fried onions","Ghee"],steps:["Marinate chicken 3 hrs","Par-cook rice 70%","Layer in pot","Add saffron milk, fried onions, mint","Dum cook 25-30 mins"]}
];

/* ── BOTTOM NAV — icon+label highlight, NO circle ── */
const BottomNav=({active,go})=>{

/* ── STICKY TOP NAV ── */
const StickyNav=({left,right})=>(
  <div style={{position:'sticky',top:0,zIndex:50,background:'white',borderBottom:`1px solid ${C.border}`,padding:'14px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 10px rgba(0,0,0,.06)'}}>

    {right||<div style={{width:38}}/>}

/* ── SLIDER CARD ── */
const SliderCard=({label,val,display,set,min,max,lo,hi})=>(
  <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
      <div style={{fontSize:14,fontWeight:500,maxWidth:'62%'}}>{label}</div>
      <span style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:C.primary}}>{display||val}</span>
    </div>
    <input type="range" min={min} max={max} value={val} onChange={e=>set(+e.target.value)}/>
    <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}><span>{lo}</span><span>{hi}</span></div>
  </div>
);

/* ══════════════════════════════════════════
   WELCOME SCREEN — logo & name CENTERED
══════════════════════════════════════════ */
const WelcomeScreen=({go})=>{
  const[slide,setSlide]=useState(0);
  const slides=[
    {img:"https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&q=80",title:"No more dinner debates",desc:'Turn "What\'s for dinner?" into a celebration. We handle the consensus so you can focus on the cooking.'},
    {img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=500&q=80",title:"AI-powered recipe extraction",desc:"Paste a reel or blog link — we extract the dish, ingredients, and nutrition instantly."},
    {img:"https://images.unsplash.com/photo-1547592180-85f173990554?w=500&q=80",title:"Family-wide voting",desc:"Give everyone a seat at the table. Cast votes on the weekly menu and find meals everyone loves."}
  ];
  useEffect(()=>{const t=setInterval(()=>setSlide(s=>(s+1)%3),3800);return()=>clearInterval(t);},[]);

  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100vh',padding:'52px 24px 40px',background:C.bg}}>
      {/* CENTERED logo + name */}
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,marginBottom:28}}>
        <div style={{width:52,height:52,borderRadius:'50%',background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 24px rgba(123,37,37,.3)`}}>

        <span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:19,color:C.primary,textAlign:'center'}}>The Culinary Hearth</span>

      <div style={{borderRadius:28,overflow:'hidden',height:256,marginBottom:26,boxShadow:'0 12px 32px rgba(0,0,0,.14)'}}>

      </div>

/* ══ ONBOARDING 1 — Age / Weight(kg) / Height only ══ */
const Onboarding1=({go,setProfile})=>{
  const[age,setAge]=useState(25);
  const[wt,setWt]=useState(70);       // kg
  const[ht,setHt]=useState(170);      // cm
  const[unit,setUnit]=useState('cm');
  const cmToFt=cm=>{const tot=Math.round(cm/2.54);return`${Math.floor(tot/12)}'${tot%12}"`;}
  const htDisplay=unit==='cm'?`${ht} cm`:cmToFt(ht);
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('welcome')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14}}>✕</div>
        <div><div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div><div style={{fontSize:12,color:C.muted}}>Step 1 of 3</div></div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:28}}><div style={{height:'100%',width:'33%',background:C.primary,borderRadius:2}}/></div>
      <h1 style={{fontFamily:'Playfair Display',fontSize:27,fontWeight:700,marginBottom:24,lineHeight:1.3}}>Let's get to know <span style={{color:C.primary}}>the chef.</span></h1>

      <SliderCard label="What is your age?" val={age} set={setAge} min={13} max={80} lo="13 yrs" hi="80 yrs"/>
      <SliderCard label="What is your body weight?" val={wt} display={`${wt} kg`} set={setWt} min={30} max={150} lo="30 kg" hi="150 kg"/>

      {/* Height with cm/inch toggle */}
      <div style={{background:'white',borderRadius:18,padding:'18px 20px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14}}>
          <div>
            <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>What is your height?</div>
            <div style={{display:'flex',gap:4}}>
              {['cm','inch'].map(u=><span key={u} onClick={()=>setUnit(u)} style={{padding:'3px 12px',borderRadius:20,fontSize:12,background:unit===u?C.dark:'#F0E8DC',color:unit===u?'white':C.muted,cursor:'pointer',fontWeight:500,transition:'all .2s'}}>{u}</span>)}
            </div>
          </div>
          <span style={{fontFamily:'Playfair Display',fontSize:22,fontWeight:700,color:C.primary}}>{htDisplay}</span>
        </div>
        <input type="range" min={130} max={220} value={ht} onChange={e=>setHt(+e.target.value)}/>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:C.muted,marginTop:8}}>
          <span>{unit==='cm'?'130 cm':"4'3\""}</span><span>{unit==='cm'?'220 cm':"7'2\""}</span>
        </div>
      </div>

      <button className="tap" onClick={()=>{setProfile(p=>({...p,age,weightKg:wt,heightCm:ht}));go('onboarding2');}} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:C.primary,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',marginTop:8,fontFamily:'DM Sans'}}>
        Continue to Preferences →
      </button>
    </div>
  );
};

/* ══ ONBOARDING 2 — Food Preference + Allergies ══ */
const Onboarding2=({go,setProfile})=>{
  const[pref,setPref]=useState('nonveg');
  const[allergies,setAllergies]=useState([]);
  const prefOpts=[{id:'veg',emoji:'🥗',label:'Veg',desc:'Plant-based including dairy'},{id:'nonveg',emoji:'🍗',label:'Non-Veg',desc:'Meat, poultry, seafood'},{id:'vegan',emoji:'🥑',label:'Vegan',desc:'Strict plant-based, no animal products'}];
  const allergyOpts=[
    {id:'dairy',label:'Dairy 🥛',desc:'Milk, cheese, butter'},
    {id:'gluten',label:'Gluten 🌾',desc:'Wheat, rye, barley'},
    {id:'nuts',label:'Tree Nuts 🥜',desc:'Almonds, walnuts, cashews'},
    {id:'eggs',label:'Eggs 🥚',desc:'All egg products'},
    {id:'shellfish',label:'Shellfish 🦐',desc:'Shrimp, crab, lobster'},
    {id:'soy',label:'Soy 🫘',desc:'Soybeans, tofu, edamame'},
    {id:'fish',label:'Fish 🐟',desc:'All fish varieties'},
    {id:'none',label:'No Allergies ✅',desc:'I can eat everything'},
  ];
  const toggleAllergy=id=>{
    if(id==='none'){setAllergies(['none']);return;}
    setAllergies(a=>{const next=a.filter(x=>x!=='none');return next.includes(id)?next.filter(x=>x!==id):[...next,id];});
  };
  return(
    <div className="slide-up" style={{padding:'52px 24px 40px',minHeight:'100vh',background:C.bg}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
        <div className="tap" onClick={()=>go('onboarding1')} style={{width:34,height:34,borderRadius:'50%',background:'#E8DDD0',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14}}>←</div>
        <div><div style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:15}}>Personalize Your Hearth</div><div style={{fontSize:12,color:C.muted}}>Step 2 of 3</div></div>
      </div>
      <div style={{height:4,background:'#E0D8CC',borderRadius:2,marginBottom:24}}><div style={{height:'100%',width:'66%',background:C.primary,borderRadius:2}}/></div>

      <h1 style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,marginBottom:6,lineHeight:1.3}}>Food <span style={{color:C.primary}}>Preferences</span></h1>
      <p style={{color:C.muted,fontSize:13.5,marginBottom:16}}>Choose your diet type and any food allergies</p>

      {/* Diet type */}
      <div style={{marginBottom:20}}>
        {prefOpts.map(o=>(
          <div key={o.id} className="tap" onClick={()=>setPref(o.id)} style={{background:'white',borderRadius:16,padding:'13px 16px',marginBottom:10,display:'flex',alignItems:'center',gap:12,cursor:'pointer',border:`2px solid ${pref===o.id?C.primary:'transparent'}`,transition:'border .2s'}}>
            <div style={{width:40,height:40,borderRadius:'50%',background:'#F5EFE0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{o.emoji}</div>
            <div style={{flex:1}}><div style={{fontWeight:600,fontSize:14}}>{o.label}</div><div style={{fontSize:12,color:C.muted,marginTop:1}}>{o.desc}</div></div>
            <div style={{width:20,height:20,borderRadius:'50%',background:pref===o.id?C.primary:'transparent',border:`2px solid ${pref===o.id?C.primary:'#D0C8BC'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              {pref===o.id&&<span style={{color:'white',fontSize:10,fontWeight:700}}>✓</span>}
            </div>
          </div>
        ))}
      </div>

      {/* Allergies */}
      <h2 style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:18,marginBottom:12}}>Any food <span style={{color:C.primary}}>allergies</span>?</h2>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:22}}>
        {allergyOpts.map(o=>{
          const sel=allergies.includes(o.id);
          return(
            <div key={o.id} className="tap" onClick={()=>toggleAllergy(o.id)} style={{background:sel?'#FDF5F0':'white',borderRadius:14,padding:'10px 12px',cursor:'pointer',border:`2px solid ${sel?C.primary:'transparent'}`,transition:'all .2s'}}>
              <div style={{fontWeight:600,fontSize:13,marginBottom:2}}>{o.label}</div>
              <div style={{fontSize:11,color:C.muted}}>{o.desc}</div>
            </div>
          );
        })}
      </div>

      <button className="tap" onClick={()=>{setProfile(p=>({...p,pref,allergies}));go('onboarding3');}} style={{width:'100%',padding:'15px',borderRadius:50,border:'none',background:C.primary,color:'white',fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>
        Continue →
      </button>
    </div>
  );
};

/* ── SVG Body Silhouettes ── */

  // type: 'soft' | 'fit' | 'athletic'
  const col=selected?C.primary:'#C4B8A8';
  if(type==='soft') return(
    <svg viewBox="0 0 60 110" width="60" height="110">

      <ellipse cx="50" cy="52" rx="7" ry="16" fill={col} opacity=".8"/>
      {/* legs */}<ellipse cx="22" cy="88" rx="8" ry="16" fill={col} opacity=".8"/>
      <ellipse cx="38" cy="88" rx="8" ry="16" fill={col} opacity=".8"/>
    </svg>
  );
  if(type==='fit') return(
    <svg viewBox="0 0 60 110" width="60" height="110">
      <circle cx="30" cy="12" r="9" fill={col} opacity=".9"/>
      <rect x="27" y="20" width="7" height="7" rx="3" fill={col}/>
      {/* body - V shape, toned */}
      <path d="M14 32 L46 32 L40 72 L20 72 Z" fill={col} opacity=".85" rx="4"/>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
          <div style={{background:'white',borderRadius:18,padding:'14px',textAlign:'center',position:'relative'}}>
            <span style={{position:'absolute',top:10,right:12,fontSize:12}}>⭐</span>
            <div style={{position:'relative',display:'inline-block',marginBottom:7}}>
              <div style={{width:48,height:48,borderRadius:'50%',background:'#D4956A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'white',fontFamily:'Playfair Display'}}>{adminMember.initials}</div>
              <div style={{position:'absolute',bottom:1,right:1,width:12,height:12,borderRadius:'50%',background:C.green,border:'2px solid white'}}/>
            </div>
            <div style={{fontWeight:600,fontSize:13.5}}>{adminMember.name}</div>
            <div style={{fontSize:10,color:C.primary,fontWeight:700,marginTop:2,letterSpacing:.4}}>COOKING TONIGHT</div>
          </div>
          {extras.map(m=>(
            <div key={m.id} style={{background:'white',borderRadius:18,padding:'14px',textAlign:'center',position:'relative'}}>
              <div style={{position:'relative',display:'inline-block',marginBottom:7}}>
                <div style={{width:48,height:48,borderRadius:'50%',background:m.color||'#6A9FD4',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:'white'}}>{m.initials}</div>
                <div style={{position:'absolute',bottom:1,right:1,width:12,height:12,borderRadius:'50%',background:m.eating?C.green:'#F44336',border:'2px solid white'}}/>
              </div>
              <div style={{fontWeight:600,fontSize:13.5}}>{m.name}</div>
            </div>
          ))}
          <div className="tap" style={{background:'white',borderRadius:18,padding:'14px',textAlign:'center',border:`2px dashed ${C.border}`,cursor:'pointer'}}>
            <div style={{width:48,height:48,borderRadius:'50%',background:C.light,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,margin:'0 auto 7px',color:C.muted}}>+</div>
            <div style={{fontWeight:600,fontSize:13,color:C.text}}>Add Member</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2,letterSpacing:.3}}>GROW THE GROUP</div>
          </div>
        </div>

        {/* Tonight's plan */}
        <h2 style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:19,marginBottom:12}}>Tonight's Plan</h2>
        {todaysDish?(
          <div style={{background:'white',borderRadius:22,overflow:'hidden',boxShadow:'0 4px 20px rgba(0,0,0,.07)',marginBottom:20}}>
            {todaysDish.img&&<img src={todaysDish.img} alt={todaysDish.name} style={{width:'100%',height:200,objectFit:'cover'}}/>}
            <div style={{padding:'14px 18px 18px'}}>
              <span style={{background:'#E8F5E9',color:'#2E7D32',padding:'3px 10px',borderRadius:20,fontSize:11,fontWeight:700,letterSpacing:.5}}>CONFIRMED</span>
              <h3 style={{fontFamily:'Playfair Display',fontSize:21,fontWeight:700,margin:'9px 0 5px'}}>{todaysDish.name}</h3>
              {todaysDish.desc&&<p style={{color:C.muted,fontSize:13,fontStyle:'italic',marginBottom:13,lineHeight:1.5}}>{todaysDish.desc}</p>}
              <div style={{display:'flex',gap:20,marginBottom:14}}>
                {[['PROTEIN',todaysDish.protein],['FIBER',todaysDish.fiber],['CARBS',todaysDish.carbs]].map(([l,v])=>(
                  <div key={l}><div style={{fontFamily:'Playfair Display',fontSize:20,fontWeight:700,lineHeight:1}}>{v}<span style={{fontSize:12}}> gm</span></div><div style={{fontSize:10,color:C.muted,fontWeight:700,marginTop:2,letterSpacing:.5}}>{l}</div></div>
                ))}
              </div>
              <button className="tap" onClick={()=>showRecipe(todaysDish)} style={{background:C.primary,color:'white',border:'none',borderRadius:50,padding:'10px 22px',fontSize:13.5,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans',float:'right'}}>View Recipe</button>
              <div style={{clear:'both'}}/>
            </div>
          </div>
        ):(
          <div style={{background:'white',borderRadius:22,padding:'34px 24px',textAlign:'center',marginBottom:20,boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
            <div style={{fontSize:52,marginBottom:12}}>🍲</div>
            <h3 style={{fontFamily:'Playfair Display',fontSize:20,fontWeight:700,marginBottom:7}}>No dishes yet!</h3>
            <p style={{color:C.muted,fontSize:13.5,lineHeight:1.65,marginBottom:20}}>Your family hasn't voted on tonight's dinner.<br/>Start voting or add directly to the Planner.</p>
            <div style={{display:'flex',gap:10,justifyContent:'center'}}>
              <button className="tap" onClick={()=>go('match')} style={{background:C.primary,color:'white',border:'none',borderRadius:50,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>Vote in Match</button>
              <button className="tap" onClick={()=>go('planner')} style={{background:'white',color:C.text,border:`2px solid ${C.border}`,borderRadius:50,padding:'10px 18px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>Open Planner</button>
            </div>
          </div>
        )}
      </div>
      <BottomNav active="hearth" go={go}/>
    </div>
  );
};

/* ══ MATCH — swipe only, no tabs, macros on ONE line ══ */
const MatchScreen=({go,showRecipe,dishPool,votes,onVote})=>{
  const[anim,setAnim]=useState(null);
  const unvoted=dishPool.filter(d=>votes[d.id]===undefined);
  const current=unvoted[0];
  const vote=liked=>{
    if(!current)return;
    setAnim(liked?'right':'left');
    setTimeout(()=>{onVote(current.id,liked);setAnim(null);},260);
  };
  const voted=dishPool.filter(d=>votes[d.id]!==undefined).length;
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',paddingBottom:80}}>
      <StickyNav left={<span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:20,color:C.primary}}>Tonight's Contenders</span>}/>

      {current?(
        <div style={{flex:1,padding:'14px 20px 0',display:'flex',flexDirection:'column'}}>
          {/* progress */}
          <div style={{display:'flex',gap:4,marginBottom:14}}>
            {dishPool.map((d,i)=>{const done=votes[d.id]!==undefined;return<div key={i} style={{flex:1,height:3,borderRadius:2,background:done?C.primary:'#E0D8CC',opacity:done?.4:1}}/>;} )}
          </div>

          {/* card */}
          <div style={{flex:1,marginBottom:18}}>
            <div style={{borderRadius:24,overflow:'hidden',background:'white',transform:anim==='left'?'translateX(-70px) rotate(-9deg)':anim==='right'?'translateX(70px) rotate(9deg)':'none',opacity:anim?0:1,transition:'all .24s cubic-bezier(.4,0,.2,1)',boxShadow:'0 10px 40px rgba(0,0,0,.13)'}}>
              <div style={{position:'relative',height:300}}>
                <img src={current.img} alt={current.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 52%,rgba(0,0,0,.74)'}}/>
                <div style={{position:'absolute',bottom:18,left:20}}>
                  <h2 style={{fontFamily:'Playfair Display',fontSize:26,fontWeight:700,color:'white',lineHeight:1.15}}>{current.name}</h2>
                </div>
              </div>
              <div style={{padding:'14px 18px 20px'}}>
                {/* Macros — all on ONE line */}
                <div style={{display:'flex',gap:6,marginBottom:12,alignItems:'center',flexWrap:'nowrap',overflow:'hidden'}}>
                  {[['🔥',`${current.cal} kcal`],['💪',`${current.protein}g prot`],['🌾',`${current.carbs}g carbs`],['🌿',`${current.fiber}g fiber`]].map(([ic,v])=>(
                    <div key={v} style={{background:C.light,borderRadius:50,padding:'5px 9px',display:'flex',alignItems:'center',gap:4,fontSize:11,fontWeight:600,flexShrink:0,whiteSpace:'nowrap'}}><span style={{fontSize:12}}>{ic}</span>{v}</div>
                  ))}
                </div>
                <p style={{color:C.muted,fontSize:13,fontStyle:'italic',lineHeight:1.5,marginBottom:8}}>{current.desc}</p>
                <div onClick={()=>showRecipe(current)} style={{textAlign:'right',color:C.muted,fontSize:11.5,fontWeight:700,cursor:'pointer',letterSpacing:.7}}>VIEW RECIPE →</div>
              </div>
            </div>
          </div>

          {/* Buttons */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:28,paddingBottom:8}}>
            <button className="vote-skip" onClick={()=>vote(false)} style={{width:64,height:64,borderRadius:'50%',background:'white',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 18px rgba(0,0,0,.11)',fontSize:24,color:C.muted}}>✕</button>
            <button className="vote-love" onClick={()=>vote(true)} style={{width:80,height:80,borderRadius:'50%',background:C.primary,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:30,boxShadow:`0 8px 28px rgba(123,37,37,.4)`}}>❤️</button>
          </div>
          <div style={{textAlign:'center',marginTop:10,color:C.muted,fontSize:12}}>{unvoted.length} left · {voted} voted</div>
        </div>
      ):(
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px',textAlign:'center'}}>
          <div style={{fontSize:56,marginBottom:14}}>🎉</div>
          <h3 style={{fontFamily:'Playfair Display',fontSize:22,fontWeight:700,marginBottom:8}}>All done!</h3>
          <p style={{color:C.muted,fontSize:14}}>You've voted on all {dishPool.length} dishes.<br/>Head to Planner to see the week.</p>
          <div style={{marginTop:20,display:'flex',flexDirection:'column',gap:8,width:'100%'}}>
            {dishPool.map(d=>(
              <div key={d.id} style={{display:'flex',alignItems:'center',gap:10,background:'white',borderRadius:12,padding:'10px 12px',boxShadow:'0 1px 6px rgba(0,0,0,.04)'}}>
                <img src={d.img} alt={d.name} style={{width:40,height:40,borderRadius:9,objectFit:'cover'}}/>
                <span style={{flex:1,fontWeight:500,fontSize:13.5,textAlign:'left'}}>{d.name}</span>
                <span style={{fontSize:18}}>{votes[d.id]?'❤️':'✕'}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      <BottomNav active="match" go={go}/>
    </div>
  );
};

/* ══ PLANNER ══ */
const PlannerScreen=({go,showRecipe,isAdmin,plannedMeals,setPlannedMeals})=>{
  const[selDay,setSelDay]=useState(2);
  const[addTarget,setAddTarget]=useState(null);
  const[repeatTarget,setRepeatTarget]=useState(null);
  const[openMenu,setOpenMenu]=useState(null);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],dates=[7,8,9,10,11,12,13];
  const hours=['7 AM','8 AM','9 AM','10 AM','11 AM','12 PM','1 PM','2 PM','3 PM','4 PM','5 PM','6 PM','7 PM','8 PM','9 PM'];
  const key=(d,h)=>`${d}_${h}`;
  const getMeal=(d,h)=>plannedMeals[key(d,h)]||null;
  const setRepeat=(d,h,rep)=>setPlannedMeals(p=>({...p,[key(d,h)]:{...p[key(d,h)],repeat:rep}}));
  const removeMeal=(d,h)=>setPlannedMeals(p=>{const n={...p};delete n[key(d,h)];return n;});
  const addMeal=(d,h,dish)=>setPlannedMeals(p=>({...p,[key(d,h)]:{dish,repeat:'once'}}));
  const dayHasMeal=i=>hours.some(h=>getMeal(i,h));
  const rl={once:'',daily:'Every day',weekly:'Every week',monthly:'Every month'};
  return(
    <div style={{paddingBottom:100,minHeight:'100vh',background:C.bg}} onClick={()=>setOpenMenu(null)}>
      <StickyNav left={<span style={{fontFamily:'Playfair Display',fontWeight:700,fontSize:21}}>Meal Plan</span>}/>

      <div style={{background:'white',margin:'12px 20px',borderRadius:18,padding:'14px',boxShadow:'0 2px 10px rgba(0,0,0,.05)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{fontSize:15}}>📅</span><span style={{fontWeight:600,fontSize:14}}>April 2025</span></div>
          <div style={{display:'flex',gap:7,alignItems:'center',fontSize:13,color:C.muted,cursor:'pointer'}}><span>◀</span><span style={{fontWeight:600}}>Today</span><span>▶</span></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {days.map((d,i)=>(
            <div key={d} onClick={()=>setSelDay(i)} style={{textAlign:'center',cursor:'pointer'}}>
              <div style={{fontSize:10.5,color:C.muted,marginBottom:5,fontWeight:500}}>{d}</div>
              <div style={{width:32,height:32,borderRadius:'50%',margin:'0 auto',background:selDay===i?C.primary:'transparent',color:selDay===i?'white':C.text,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:selDay===i?700:400,fontSize:14,transition:'all .2s'}}>{dates[i]}</div>
              <div style={{width:'55%',height:3,borderRadius:2,background:dayHasMeal(i)?C.primary:'#E0D8CC',margin:'5px auto 0',opacity:.7}}/>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:'0 20px'}}>
        {hours.map(t=>{
          const meal=getMeal(selDay,t);
          const mk=`${selDay}_${t}`;
          return(
            <div key={t} style={{display:'flex',gap:10,alignItems:'flex-start',minHeight:meal?96:40}} onClick={e=>e.stopPropagation()}>
              <div style={{width:44,fontSize:12,color:C.muted,paddingTop:12,flexShrink:0,textAlign:'right'}}>{t}</div>
              <div style={{flex:1,borderLeft:`1.5px solid ${C.border}`,paddingLeft:12,paddingBottom:4,paddingTop:8}}>
                {meal?(
                  <div style={{background:'white',borderRadius:14,padding:'9px 11px',display:'flex',gap:10,alignItems:'center',boxShadow:'0 2px 10px rgba(0,0,0,.06)',position:'relative'}}>
                    {meal.dish.img?<img src={meal.dish.img} alt="" style={{width:44,height:44,borderRadius:10,objectFit:'cover',flexShrink:0}}/>:<div style={{width:44,height:44,borderRadius:10,background:C.light,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>🍽</div>}
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meal.dish.name}</div>
                      {/* macros on one line */}
                      <div style={{fontSize:10.5,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>🔥{meal.dish.cal} · 💪{meal.dish.protein}g · 🌾{meal.dish.carbs}g · 🌿{meal.dish.fiber}g</div>
                      {meal.repeat&&meal.repeat!=='once'&&<div style={{fontSize:10,color:C.primary,fontWeight:600,marginTop:2}}>🔄 {rl[meal.repeat]}</div>}
                    </div>
                    <div style={{position:'relative',flexShrink:0}}>
                      <div onClick={e=>{e.stopPropagation();setOpenMenu(openMenu===mk?null:mk);}} style={{padding:'4px 6px',cursor:'pointer',color:C.muted,fontWeight:900,fontSize:14,letterSpacing:1}}>•••</div>
                      {openMenu===mk&&(
                        <div style={{position:'absolute',right:0,top:26,background:'white',borderRadius:12,boxShadow:'0 4px 24px rgba(0,0,0,.16)',zIndex:80,overflow:'hidden',minWidth:168}} onClick={e=>e.stopPropagation()}>
                          <div onClick={()=>{setOpenMenu(null);showRecipe(meal.dish);}} style={{padding:'11px 15px',fontSize:13,fontWeight:500,cursor:'pointer',borderBottom:`1px solid ${C.border}`}}>🍽 View Recipe</div>
                          <div onClick={()=>{setOpenMenu(null);setRepeatTarget({hour:t,meal:meal.dish});}} style={{padding:'11px 15px',fontSize:13,fontWeight:500,cursor:'pointer',borderBottom:isAdmin?`1px solid ${C.border}`:'none'}}>🔄 Repeat Schedule</div>
                          {isAdmin&&<div onClick={()=>{setOpenMenu(null);removeMeal(selDay,t);}} style={{padding:'11px 15px',fontSize:13,fontWeight:500,cursor:'pointer',color:'#E53935'}}>🗑 Remove</div>}
                        </div>
                      )}
                    </div>
                  </div>
                ):(
                  <div onClick={()=>setAddTarget({hour:t})} style={{color:'#C4B8A8',fontSize:22,cursor:'pointer',lineHeight:1,paddingTop:2,display:'inline-block'}}>+</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      <BottomNav active="planner" go={go}/>
      {addTarget&&<AddDishModal onAdd={d=>{addMeal(selDay,addTarget.hour,d);setAddTarget(null);}} onClose={()=>setAddTarget(null)}/>}
      {repeatTarget&&<RepeatModal dishName={repeatTarget.meal.name} onSelect={rep=>setRepeat(selDay,repeatTarget.hour,rep)} onClose={()=>setRepeatTarget(null)}/>}
    </div>
  );
};

/* ── RECIPE MODAL ── */
const RecipeModal=({dish,close})=>{
  if(!dish)return null;
  return(
    <div className="slide-up" style={{position:'fixed',top:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:390,height:'100vh',background:C.bg,zIndex:200,overflowY:'auto'}}>
      <div style={{position:'relative'}}>
        {dish.img?<img src={dish.img} alt={dish.name} style={{width:'100%',height:250,objectFit:'cover'}}/>:<div style={{height:110,background:C.primary,display:'flex',alignItems:'center',justifyContent:'center',fontSize:46}}>🍽</div>}
        <div style={{position:'absolute',inset:0,background:'linear-gradient(transparent 50%,rgba(0,0,0,.25))'}}/>
        <button className="tap" onClick={close} style={{position:'absolute',top:48,left:20,width:40,height:40,borderRadius:'50%',background:'rgba(0,0,0,.45)',border:'none',color:'white',fontSize:17,cursor:'pointer'}}>←</button>
      </div>
      <div style={{padding:'18px 20px 100px'}}>
        <h1 style={{fontFamily:'Playfair Display',fontSize:24,fontWeight:700,marginBottom:9,lineHeight:1.2}}>{dish.name}</h1>
        {dish.desc&&<p style={{color:C.muted,fontStyle:'italic',fontSize:13,marginBottom:14,lineHeight:1.5}}>{dish.desc}</p>}
        <div style={{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}}>
          {[['🔥',(dish.cal||0)+' kcal'],['💪',(dish.protein||0)+'g protein'],['🌾',(dish.carbs||0)+'g carbs'],['🌿',(dish.fiber||0)+'g fiber']].map(([ic,v])=>(
            <span key={v} style={{background:C.light,borderRadius:50,padding:'5px 12px',fontSize:11.5,fontWeight:500}}>{ic} {v}</span>
          ))}
        </div>
        {dish.ingredients&&<>
          <h3 style={{fontFamily:'Playfair Display',fontSize:17,fontWeight:700,marginBottom:10}}>Ingredients</h3>
          <div style={{background:'white',borderRadius:16,padding:'12px 16px',marginBottom:18}}>
            {dish.ingredients.map((ing,i)=>(
              <div key={i} style={{display:'flex',gap:10,padding:'7px 0',borderBottom:i<dish.ingredients.length-1?`1px solid ${C.border}`:'none'}}>
                <span style={{color:C.primary,fontWeight:800,flexShrink:0}}>·</span>
                <span style={{fontSize:13.5,lineHeight:1.4}}>{ing}</span>
              </div>
            ))}
          </div>
        </>}
        {dish.steps&&<>
          <h3 style={{fontFamily:'Playfair Display',fontSize:17,fontWeight:700,marginBottom:12}}>How to Make</h3>
          {dish.steps.map((step,i)=>(
            <div key={i} style={{display:'flex',gap:11,marginBottom:12,alignItems:'flex-start'}}>
              <div style={{width:25,height:25,borderRadius:'50%',background:C.primary,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
              <p style={{fontSize:13.5,lineHeight:1.65,paddingTop:3}}>{step}</p>
            </div>
          ))}
        </>}
      </div>
    </div>
  );
};

/* ══ ROOT ══ */
const App=()=>{
  const[screen,setScreen]=useState('welcome');
  const[recipe,setRecipe]=useState(null);
  const[profile,setProfileState]=useState({});
  const[members,setMembers]=useState([]);
  const[votes,setVotes]=useState({});
  const[plannedMeals,setPlannedMeals]=useState({});
  const isAdmin=true;

  const setProfile=fn=>setProfileState(fn);

  // Auto-set admin member from profile
  useEffect(()=>{
    if(profile?.age){
      setMembers([{id:1,name:'You (Admin)',role:'admin',initials:'AD',eating:true,color:'#D4956A'}]);
    }
  },[profile?.age]);

  const go=s=>{setScreen(s);window.scrollTo(0,0);};
  const onVote=(id,liked)=>setVotes(v=>({...v,[id]:liked}));

  const screens={
    welcome:<WelcomeScreen go={go}/>,
    onboarding1:<Onboarding1 go={go} setProfile={setProfile}/>,
    onboarding2:<Onboarding2 go={go} setProfile={setProfile}/>,
    onboarding3:<Onboarding3 go={go} profile={profile} setProfile={setProfile}/>,
    createjoin:<CreateJoinScreen go={go} userName="Chef"/>,
    joincode:<JoinCodeScreen go={go}/>,
    hearth:<HearthScreen go={go} showRecipe={setRecipe} profile={profile} members={members} plannedMeals={plannedMeals}/>,
    match:<MatchScreen go={go} showRecipe={setRecipe} dishPool={DISH_POOL} votes={votes} onVote={onVote}/>,
    planner:<PlannerScreen go={go} showRecipe={setRecipe} isAdmin={isAdmin} plannedMeals={plannedMeals} setPlannedMeals={setPlannedMeals}/>,
  };

  return(
    <>
      {screens[screen]||screens.welcome}
      {recipe&&<RecipeModal dish={recipe} close={()=>setRecipe(null)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
